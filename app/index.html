<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glean — A PhD Studio</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2032%2032%22%3E%3Crect%20width%3D%2232%22%20height%3D%2232%22%20rx%3D%226%22%20fill%3D%22%23041F33%22%2F%3E%3Cg%20stroke%3D%22%23ffffff%22%20stroke-width%3D%221%22%20stroke-linecap%3D%22round%22%20fill%3D%22none%22%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%2216%22%20y2%3D%2228%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%2216%22%20y2%3D%225%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%229%22%20y2%3D%227%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%2223%22%20y2%3D%227%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%226%22%20y2%3D%2211%22%2F%3E%3Cline%20x1%3D%2216%22%20y1%3D%2214%22%20x2%3D%2226%22%20y2%3D%2211%22%2F%3E%3C%2Fg%3E%3Ccircle%20cx%3D%2216%22%20cy%3D%2214%22%20r%3D%221.6%22%20fill%3D%22%23ffffff%22%2F%3E%3C%2Fsvg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Inter', sans-serif;
    --bg: #041F33;
    --fg: #ffffff;
    --muted: hsl(240 4% 66%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* 视频背景：铺满视口，居中裁切 */
  .bg-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    object-position: center bottom;
    background: #041F33;
    z-index: 0;
    pointer-events: none;
  }
  .bg-video-fallback {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #041F33;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px 22vh;   /* 底部留白更多，整体视觉上移避开笔记本屏幕 */
  }

  /* Liquid glass CTA */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.18);
    position: relative;
    overflow: hidden;
    color: var(--fg);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 400;
    transition: transform .2s ease, background .2s ease;
    border-radius: 9999px;
    padding: 18px 52px;
    font-size: 16px;
    margin-top: 44px;
    border: none;
  }
  .liquid-glass:hover {
    transform: scale(1.03);
    background: rgba(255, 255, 255, 0.08);
  }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  /* Hero */
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    max-width: 1100px;
    width: 100%;
  }
  .signature {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(48px, 8vw, 128px);
    line-height: 0.95;
    letter-spacing: -2.46px;
    color: var(--muted);
    margin: 0 0 18px 0;
  }
  .signature sup {
    font-size: 0.22em;
    vertical-align: super;
    margin-left: 0.05em;
    opacity: 0.85;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(26px, 4vw, 52px);
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin: 18px 0 0 0;
    color: var(--fg);
    max-width: 820px;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--muted);
  }
  .hero-subtitle {
    font-size: 16px;
    line-height: 1.7;
    color: var(--muted);
    max-width: 640px;
    margin: 32px auto 0;
    padding: 0 8px;
    font-weight: 600;
  }
  @media (min-width: 640px) { .hero-subtitle { font-size: 18px; } }
  /* Footer signature — author credit, separate from the Glean brand */
  .hero-footer {
    position: absolute;
    bottom: 32px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-display);
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.02em;
    color: var(--muted);
    opacity: 0.6;
    z-index: 10;
  }
  .hero-footer sup { font-size: 0.7em; opacity: 0.7; margin-left: 0.1em; }

  /* Animations */
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-rise         { animation: fade-rise .8s ease-out both; }
  .animate-fade-rise-delay   { animation: fade-rise .8s ease-out .2s both; }
  .animate-fade-rise-delay-2 { animation: fade-rise .8s ease-out .4s both; }
  .animate-fade-rise-delay-3 { animation: fade-rise .8s ease-out .6s both; }

  /* 蒲公英种子光标尾迹：全局漂浮 + 柔光 + 闪烁 */
  .seed-trail {
    position: fixed;
    pointer-events: none;
    z-index: 90;
    will-change: transform, opacity;
    animation:
      seedTrailDrift var(--dur, 2800ms) cubic-bezier(.25,.55,.4,1) forwards,
      seedTwinkle 1.6s ease-in-out infinite;
    filter:
      drop-shadow(0 0 3px rgba(255,240,190,0.7))
      drop-shadow(0 0 9px rgba(230,210,140,0.5))
      drop-shadow(0 0 18px rgba(180,200,140,0.3));
  }
  @keyframes seedTrailDrift {
    0%   { opacity: 0; transform: translate(0, 0) scale(0.45) rotate(0deg); }
    18%  { opacity: 0.9; }
    60%  { opacity: 0.75; }
    100% { opacity: 0; transform: translate(var(--dx, 0px), var(--dy, -28px)) scale(1) rotate(var(--rot, 18deg)); }
  }
  @keyframes seedTwinkle {
    0%, 100% { opacity: 0.9; }
    50%      { opacity: 0.55; }
  }
  @media (prefers-reduced-motion: reduce) {
    .seed-trail { animation: none !important; }
  }
</style>
</head>
<body>

<!-- 蒲公英种子 SVG symbol（与 logo 同款：种粒下挂 + 茎丝上扬 + 末梢光点） -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="seed-icon" viewBox="0 0 40 60">
    <g stroke="#C9B89E" stroke-width="0.45" stroke-linecap="round" fill="none" opacity="0.7">
      <line x1="20" y1="45"   x2="20"   y2="8"/>
      <line x1="20" y1="45"   x2="13"   y2="11"/>
      <line x1="20" y1="45"   x2="27"   y2="11"/>
      <line x1="20" y1="45"   x2="7"    y2="16"/>
      <line x1="20" y1="45"   x2="33"   y2="16"/>
      <line x1="20" y1="45"   x2="15.5" y2="6"/>
      <line x1="20" y1="45"   x2="24.5" y2="6"/>
    </g>
    <g fill="#FFF6DC">
      <circle cx="20"   cy="8"  r="1.8"/>
      <circle cx="15.5" cy="6"  r="1.5"/>
      <circle cx="24.5" cy="6"  r="1.5"/>
      <circle cx="13"   cy="11" r="1.6"/>
      <circle cx="27"   cy="11" r="1.6"/>
      <circle cx="7"    cy="16" r="1.3"/>
      <circle cx="33"   cy="16" r="1.3"/>
    </g>
    <ellipse cx="20" cy="50" rx="1.7" ry="3.4" fill="#3A2818"/>
  </symbol>
</svg>

<!-- Background -->
<div class="bg-video-fallback" aria-hidden="true"></div>
<video class="bg-video" autoplay loop muted playsinline preload="auto" aria-hidden="true">
  <source src="assets/hero-bg.mp4" type="video/mp4" />
</video>

<div class="page">
  <main class="hero">
    <div class="signature animate-fade-rise">Glean<span style="opacity:.5">.</span></div>
    <h1 class="animate-fade-rise-delay">
      Where every PhD is a <em>gleaner&rsquo;s</em> long walk,<br />
      picking up what the day leaves behind.
    </h1>
    <p class="hero-subtitle animate-fade-rise-delay-2">
      A quiet studio for moods, rituals, fieldwork, and the slow harvest of a doctoral life.
    </p>
    <a href="phd-workspace-v3.html" class="liquid-glass animate-fade-rise-delay-3">Begin gleaning.</a>
  </main>
</div>

<div class="hero-footer animate-fade-rise-delay-3">
  A studio by Shu<sup>®</sup> &nbsp;✦&nbsp; for the bent-over work of thinking.
</div>

<script>
  // 全局光标种子尾迹：mousemove 节流，柔光 + 闪烁 + 缓慢上飘
  (function () {
    if (!window.matchMedia) return;
    if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var active = 0;
    var MAX = 8;
    var MIN_INTERVAL = 130;
    var lastSpawn = 0;
    document.addEventListener('mousemove', function (e) {
      var now = performance.now();
      if (now - lastSpawn < MIN_INTERVAL) return;
      if (active >= MAX) return;
      lastSpawn = now;
      var jx  = (Math.random() - 0.5) * 22;
      var jy  = (Math.random() - 0.5) * 18;
      var dx  = ((Math.random() - 0.5) * 80).toFixed(1);
      var dy  = (-(Math.random() * 36 + 14)).toFixed(1);
      var rot = ((Math.random() - 0.5) * 50).toFixed(1);
      var size = 14 + Math.random() * 10;
      var dur = 2400 + Math.random() * 1400;
      var node = document.createElement('div');
      node.className = 'seed-trail';
      node.style.left = (e.clientX + jx) + 'px';
      node.style.top  = (e.clientY + jy) + 'px';
      node.style.width = size + 'px';
      node.style.height = (size * 1.5) + 'px';
      node.style.setProperty('--dx', dx + 'px');
      node.style.setProperty('--dy', dy + 'px');
      node.style.setProperty('--rot', rot + 'deg');
      node.style.setProperty('--dur', dur + 'ms');
      node.innerHTML = '<svg width="100%" height="100%" aria-hidden="true"><use href="#seed-icon"/></svg>';
      document.body.appendChild(node);
      active += 1;
      setTimeout(function () { node.remove(); active -= 1; }, dur + 60);
    }, { passive: true });
  })();
</script>

</body>
</html>
