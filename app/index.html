<!doctype html>
<html lang="zh-cn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Shu's PhD Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --font-display: 'Instrument Serif', serif;
    --font-body: 'Inter', sans-serif;
    --bg: hsl(201 100% 13%);           /* deep navy */
    --fg: hsl(0 0% 100%);
    --muted: hsl(240 4% 66%);
    --border: hsl(0 0% 18%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .bg-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 0;
  }
  .bg-video-fallback {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background:
      radial-gradient(ellipse at 50% 90%, rgba(255, 200, 60, .25), transparent 60%),
      radial-gradient(ellipse at 20% 10%, rgba(80, 120, 200, .15), transparent 60%),
      linear-gradient(180deg, #041F33 0%, #052238 60%, #0A2E45 100%);
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Nav */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px;
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 30px;
    letter-spacing: -0.02em;
    color: var(--fg);
    text-decoration: none;
    line-height: 1;
  }
  .logo sup { font-size: 10px; opacity: .85; margin-left: 2px; vertical-align: super; }
  .nav-links {
    display: none;
    gap: 32px;
    align-items: center;
  }
  @media (min-width: 768px) {
    .nav-links { display: flex; }
  }
  .nav-links a {
    font-size: 14px;
    color: var(--muted);
    text-decoration: none;
    transition: color .2s ease;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--fg); }

  /* Liquid glass */
  .liquid-glass {
    background: rgba(255, 255, 255, 0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    color: var(--fg);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-family: var(--font-body);
    font-weight: 400;
    transition: transform .2s ease;
  }
  .liquid-glass:hover { transform: scale(1.03); }
  .liquid-glass::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }
  .cta-nav {
    border-radius: 9999px;
    padding: 10px 24px;
    font-size: 14px;
  }
  .cta-hero {
    border-radius: 9999px;
    padding: 20px 56px;
    font-size: 16px;
    margin-top: 48px;
  }

  /* Hero */
  .hero {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 90px 24px;
    max-width: 1280px;
    margin: 0 auto;
    width: 100%;
  }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(48px, 8vw, 128px);
    line-height: 0.95;
    letter-spacing: -2.46px;
    margin: 0;
    max-width: 1100px;
    color: var(--fg);
  }
  .hero h1 em {
    font-style: normal;
    color: var(--muted);
  }
  .hero-subtitle {
    font-size: 16px;
    line-height: 1.7;
    color: var(--muted);
    max-width: 640px;
    margin: 32px auto 0;
    padding: 0 8px;
  }
  @media (min-width: 640px) { .hero-subtitle { font-size: 18px; } }

  /* Language toggle */
  .locale-toggle {
    position: absolute;
    top: 24px;
    right: 32px;
    z-index: 20;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--fg);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 9999px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background .2s ease;
  }
  .locale-toggle:hover { background: rgba(255,255,255,0.1); }
  @media (min-width: 768px) {
    .locale-toggle { position: static; }
  }

  /* Dim overlay above video for text legibility */
  .video-dim {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: linear-gradient(180deg,
      rgba(4, 31, 51, 0.55) 0%,
      rgba(4, 31, 51, 0.35) 40%,
      rgba(4, 31, 51, 0.65) 100%);
    pointer-events: none;
  }

  /* Animations */
  @keyframes fade-rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-rise         { animation: fade-rise .8s ease-out both; }
  .animate-fade-rise-delay   { animation: fade-rise .8s ease-out .2s both; }
  .animate-fade-rise-delay-2 { animation: fade-rise .8s ease-out .4s both; }

  /* Footer hint */
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    opacity: 0;
    animation: fade-rise .8s ease-out .8s both;
  }
</style>
</head>
<body>

<!-- Background -->
<div class="bg-video-fallback" aria-hidden="true"></div>
<video class="bg-video" autoplay loop muted playsinline preload="auto" aria-hidden="true">
  <source src="assets/hero-bg.mp4" type="video/mp4" />
</video>
<div class="video-dim" aria-hidden="true"></div>

<div class="page">
  <!-- Nav -->
  <nav class="nav">
    <a href="#" class="logo" aria-label="Shu's PhD Studio">
      Shu<sup>®</sup>
    </a>
    <div class="nav-links">
      <a href="#" class="active" data-i18n="nav.home">首页</a>
      <a href="phd-workspace-v2.html" data-i18n="nav.studio">工作站</a>
      <a href="#about" data-i18n="nav.about">关于</a>
      <a href="#journal" data-i18n="nav.journal">日志</a>
      <a href="#contact" data-i18n="nav.contact">联系</a>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <button id="localeToggle" class="locale-toggle" type="button">EN</button>
      <a href="phd-workspace-v2.html" class="liquid-glass cta-nav" data-i18n="cta.short">进入工作站</a>
    </div>
  </nav>

  <!-- Hero -->
  <main class="hero">
    <h1 id="heroTitle" class="animate-fade-rise"></h1>
    <p id="heroSubtitle" class="hero-subtitle animate-fade-rise-delay"></p>
    <a href="phd-workspace-v2.html" class="liquid-glass cta-hero animate-fade-rise-delay-2" data-i18n="cta.long">开始今日研究</a>
  </main>
</div>

<script>
  // 双语文案，复用 phd-workspace 的 uiLocale 键
  const I18N = {
    zh: {
      'nav.home':    '首页',
      'nav.studio':  '工作站',
      'nav.about':   '关于',
      'nav.journal': '日志',
      'nav.contact': '联系',
      'cta.short':   '进入工作站',
      'cta.long':    '开始今日研究',
      toggle:        'EN',
      // h1 分三段：普通 / muted / 普通
      title: [
        { text: 'Where ',               muted: false },
        { text: 'research',             muted: true  },
        { text: ' rises through the ',  muted: false },
        { text: 'silence.',             muted: true  }
      ],
      subtitle: '一个安静的工作台，为田野、写作与投稿而建。陪你走过博士的长期节奏。'
    },
    en: {
      'nav.home':    'Home',
      'nav.studio':  'Studio',
      'nav.about':   'About',
      'nav.journal': 'Journal',
      'nav.contact': 'Reach Us',
      'cta.short':   'Enter Studio',
      'cta.long':    'Begin Journey',
      toggle:        '中',
      title: [
        { text: 'Where ',               muted: false },
        { text: 'research',             muted: true  },
        { text: ' rises through the ',  muted: false },
        { text: 'silence.',             muted: true  }
      ],
      subtitle: "A quiet workspace for fieldwork, writing, and submissions. Built for the long rhythms of a PhD."
    }
  };

  // 与 phd-workspace 共用 localStorage key
  const LOCALE_KEY = 'phd_ui_locale';
  let locale = (localStorage.getItem(LOCALE_KEY) === 'en') ? 'en' : 'zh';

  function renderTitle(parts) {
    const el = document.getElementById('heroTitle');
    el.innerHTML = '';
    parts.forEach(p => {
      if (p.muted) {
        const em = document.createElement('em');
        em.textContent = p.text;
        el.appendChild(em);
      } else {
        el.appendChild(document.createTextNode(p.text));
      }
    });
  }

  function applyLocale() {
    const dict = I18N[locale];
    document.documentElement.lang = (locale === 'en') ? 'en' : 'zh-cn';
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (dict[key]) el.textContent = dict[key];
    });
    renderTitle(dict.title);
    document.getElementById('heroSubtitle').textContent = dict.subtitle;
    document.getElementById('localeToggle').textContent = dict.toggle;
  }

  document.getElementById('localeToggle').addEventListener('click', () => {
    locale = (locale === 'zh') ? 'en' : 'zh';
    localStorage.setItem(LOCALE_KEY, locale);
    applyLocale();
  });

  applyLocale();
</script>

</body>
</html>
